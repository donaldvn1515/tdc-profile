
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .app {
    padding: 2rem 1rem;
    min-height: 600px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    font-family: var(--font-sans);
    background: transparent;
  }

  .scene {
    width: 380px;
    height: 220px;
    perspective: 1000px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 16px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 28px;
  }

  .card-back {
    transform: rotateY(180deg);
  }

  .flip-hint {
    font-size: 12px;
    color: var(--color-text-tertiary);
    text-align: center;
    letter-spacing: 0.04em;
  }

  .theme-switcher {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .theme-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
    outline: none;
    position: relative;
  }

  .theme-btn:hover { transform: scale(1.15); }
  .theme-btn.active { border-color: var(--color-text-primary); transform: scale(1.15); }

  .theme-label {
    font-size: 12px;
    color: var(--color-text-secondary);
    text-align: center;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    min-width: 80px;
  }

  .copy-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    opacity: 0.5;
    transition: opacity 0.2s;
    vertical-align: middle;
  }
  .copy-btn:hover { opacity: 1; }

  /* ── THEME 1: MIDNIGHT ── */
  .t1-front, .t1-back {
    background: #0a0a0f;
    color: #e8e8ef;
  }
  .t1-front::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #3b5bdb, #7048e8, #3b5bdb);
  }
  .t1-name { font-size: 22px; font-weight: 600; color: #f0f0f8; letter-spacing: -0.02em; }
  .t1-role { font-size: 13px; color: #8888aa; margin-top: 4px; letter-spacing: 0.05em; }
  .t1-company { font-size: 12px; color: #4a4a7a; letter-spacing: 0.12em; text-transform: uppercase; }
  .t1-dot { width: 8px; height: 8px; border-radius: 50%; background: #3b5bdb; display: inline-block; margin-right: 8px; }
  .t1-row { display: flex; align-items: center; font-size: 12px; color: #8888aa; margin-bottom: 6px; gap: 8px; }
  .t1-row i { color: #3b5bdb; font-size: 14px; }
  .t1-divider { height: 0.5px; background: #1e1e3a; margin: 12px 0; }

  /* ── THEME 2: ARCTIC ── */
  .t2-front, .t2-back {
    background: #f8faff;
    color: #1a1a2e;
    border: 0.5px solid #d8e4f8;
  }
  .t2-accent { width: 36px; height: 3px; background: #4dabf7; border-radius: 2px; margin-bottom: 14px; }
  .t2-name { font-size: 21px; font-weight: 600; color: #0d1b3e; letter-spacing: -0.02em; }
  .t2-role { font-size: 12px; color: #6688bb; margin-top: 5px; letter-spacing: 0.06em; }
  .t2-company { font-size: 11px; color: #99aacc; letter-spacing: 0.1em; text-transform: uppercase; }
  .t2-row { display: flex; align-items: center; font-size: 12px; color: #445577; margin-bottom: 7px; gap: 8px; }
  .t2-row i { color: #4dabf7; font-size: 14px; }
  .t2-divider { height: 0.5px; background: #d8e4f8; margin: 12px 0; }

  /* ── THEME 3: FOREST ── */
  .t3-front, .t3-back {
    background: #1a2e22;
    color: #e8f0e0;
  }
  .t3-pattern {
    position: absolute;
    top: 0; right: 0;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(74, 124, 89, 0.12);
    transform: translate(30px, -30px);
  }
  .t3-name { font-size: 22px; font-weight: 600; color: #d4ebb0; letter-spacing: -0.01em; position: relative; }
  .t3-role { font-size: 12px; color: #7aaa88; margin-top: 4px; letter-spacing: 0.05em; position: relative; }
  .t3-company { font-size: 11px; color: #4a7a55; letter-spacing: 0.12em; text-transform: uppercase; position: relative; }
  .t3-row { display: flex; align-items: center; font-size: 12px; color: #9abba0; margin-bottom: 6px; gap: 8px; }
  .t3-row i { color: #7aaa88; font-size: 14px; }
  .t3-divider { height: 0.5px; background: rgba(122, 170, 136, 0.2); margin: 12px 0; }

  /* ── THEME 4: SUNSET ── */
  .t4-front, .t4-back {
    background: #1c1018;
    color: #f5e6e0;
  }
  .t4-glow {
    position: absolute;
    bottom: 0; right: 0;
    width: 160px; height: 100px;
    background: radial-gradient(ellipse at bottom right, rgba(220,80,50,0.18) 0%, transparent 70%);
  }
  .t4-bar { display: flex; gap: 3px; margin-bottom: 14px; }
  .t4-bar span { height: 3px; border-radius: 2px; }
  .t4-name { font-size: 22px; font-weight: 600; color: #fdddd5; letter-spacing: -0.02em; position: relative; }
  .t4-role { font-size: 12px; color: #c07060; margin-top: 5px; letter-spacing: 0.06em; position: relative; }
  .t4-company { font-size: 11px; color: #7a4535; letter-spacing: 0.12em; text-transform: uppercase; position: relative; }
  .t4-row { display: flex; align-items: center; font-size: 12px; color: #b08878; margin-bottom: 6px; gap: 8px; }
  .t4-row i { color: #e0603a; font-size: 14px; }
  .t4-divider { height: 0.5px; background: rgba(220,96,58,0.25); margin: 12px 0; }

  /* ── THEME 5: OBSIDIAN GOLD ── */
  .t5-front, .t5-back {
    background: #111009;
    color: #e8e0cc;
  }
  .t5-front::after, .t5-back::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c, transparent);
  }
  .t5-name { font-size: 22px; font-weight: 600; color: #e8d598; letter-spacing: 0.01em; }
  .t5-role { font-size: 12px; color: #9a8855; margin-top: 5px; letter-spacing: 0.08em; }
  .t5-company { font-size: 11px; color: #5a5030; letter-spacing: 0.15em; text-transform: uppercase; }
  .t5-row { display: flex; align-items: center; font-size: 12px; color: #9a8855; margin-bottom: 6px; gap: 8px; }
  .t5-row i { color: #c9a84c; font-size: 14px; }
  .t5-divider { height: 0.5px; background: rgba(201,168,76,0.2); margin: 12px 0; }
  .t5-corner {
    position: absolute;
    top: 18px; right: 18px;
    width: 20px; height: 20px;
    border-top: 1px solid #c9a84c;
    border-right: 1px solid #c9a84c;
  }
  .t5-corner-bl {
    position: absolute;
    bottom: 18px; left: 18px;
    width: 20px; height: 20px;
    border-bottom: 1px solid #c9a84c;
    border-left: 1px solid #c9a84c;
  }
</style>

<div class="app">
  <h2 class="sr-only">Professional business card with 5 switchable themes</h2>

  <div class="scene" id="scene" onclick="flipCard()" title="Click to flip">
    <div class="card-inner" id="cardInner">

      <!-- FRONTS -->
      <div class="card-face card-front" id="front"></div>
      <!-- BACKS -->
      <div class="card-face card-back" id="back"></div>

    </div>
  </div>

  <p class="flip-hint"><i class="ti ti-refresh" aria-hidden="true"></i> Click the card to flip</p>

  <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
    <div class="theme-switcher">
      <button class="theme-btn active" style="background:#0a0a0f; border-color: #3b5bdb;" onclick="setTheme(0)" title="Midnight" aria-label="Midnight theme"></button>
      <button class="theme-btn" style="background:#f8faff; border-color: #d8e4f8;" onclick="setTheme(1)" title="Arctic" aria-label="Arctic theme"></button>
      <button class="theme-btn" style="background:#1a2e22; border-color: #4a7a55;" onclick="setTheme(2)" title="Forest" aria-label="Forest theme"></button>
      <button class="theme-btn" style="background:#1c1018; border-color: #e0603a;" onclick="setTheme(3)" title="Sunset" aria-label="Sunset theme"></button>
      <button class="theme-btn" style="background:#111009; border-color: #c9a84c;" onclick="setTheme(4)" title="Obsidian Gold" aria-label="Obsidian Gold theme"></button>
    </div>
    <div class="theme-label" id="themeLabel">Midnight</div>
  </div>
</div>

<script>
const themes = ['Midnight','Arctic','Forest','Sunset','Obsidian Gold'];
let current = 0;
let flipped = false;

const info = {
  name: 'Hồ Nhật Phát',
  role: 'Chuyên gia mua giới, tư vấn bất động sản',
  company: 'Chư Sê · Gia Lai',
  email: 'hello@yourmail.com',
  phone: '+84 xxx xxx xxx',
  zalo: 'Zalo: same as phone',
  website: 'yourwebsite.com',
  linkedin: 'linkedin.com/in/yourname',
  github: 'github.com/yourname',
};

function buildFront(t) {
  if (t === 0) return `
    <div>
      <div class="t1-name">${info.name}</div>
      <div class="t1-role">${info.role}</div>
    </div>
    <div class="t1-company"><span class="t1-dot"></span>${info.company}</div>`;
  if (t === 1) return `
    <div>
      <div class="t2-accent"></div>
      <div class="t2-name">${info.name}</div>
      <div class="t2-role">${info.role}</div>
    </div>
    <div class="t2-company">${info.company}</div>`;
  if (t === 2) return `
    <div class="t3-pattern"></div>
    <div>
      <div class="t3-name">${info.name}</div>
      <div class="t3-role">${info.role}</div>
    </div>
    <div class="t3-company">${info.company}</div>`;
  if (t === 3) return `
    <div class="t4-glow"></div>
    <div style="position:relative">
      <div class="t4-bar">
        <span style="width:28px;background:#e0603a;"></span>
        <span style="width:14px;background:#e09050;"></span>
        <span style="width:8px;background:#e0c060;"></span>
      </div>
      <div class="t4-name">${info.name}</div>
      <div class="t4-role">${info.role}</div>
    </div>
    <div class="t4-company" style="position:relative">${info.company}</div>`;
  if (t === 4) return `
    <div class="t5-corner"></div>
    <div class="t5-corner-bl"></div>
    <div>
      <div class="t5-name">${info.name}</div>
      <div class="t5-role">${info.role}</div>
    </div>
    <div class="t5-company">${info.company}</div>`;
}

function row(cls, icon, text) {
  return `<div class="${cls}-row"><i class="ti ti-${icon}" aria-hidden="true"></i><span>${text}</span></div>`;
}

function buildBack(t) {
  const c = `t${t+1}`;
  const ic = t === 1 ? '#4dabf7' : t === 2 ? '#7aaa88' : t === 3 ? '#e0603a' : t === 4 ? '#c9a84c' : '#3b5bdb';
  const extras = t === 4 ? `<div class="t5-corner"></div><div class="t5-corner-bl"></div>` : '';
  return `
    ${extras}
    <div>
      ${row(c,'mail',info.email)}
      ${row(c,'phone',info.phone)}
      ${row(c,'message-circle',info.zalo)}
      <div class="${c}-divider"></div>
      ${row(c,'world',info.website)}
      ${row(c,'brand-linkedin',info.linkedin)}
      ${row(c,'brand-github',info.github)}
    </div>`;
}

function getFaceClasses(t, side) {
  return `t${t+1}-${side === 'front' ? 'front' : 'back'}`;
}

function render() {
  const t = current;
  const front = document.getElementById('front');
  const back = document.getElementById('back');

  front.className = `card-face card-front ${getFaceClasses(t,'front')}`;
  back.className = `card-face card-back ${getFaceClasses(t,'back')}`;

  front.innerHTML = buildFront(t);
  back.innerHTML = buildBack(t);
}

function setTheme(idx) {
  current = idx;
  document.querySelectorAll('.theme-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
  document.getElementById('themeLabel').textContent = themes[idx];
  render();
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('cardInner').classList.toggle('flipped', flipped);
}

render();
</script>
